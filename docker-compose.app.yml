version: '3.9'

# ─── Application Stack ────────────────────────────────────────────────────────
# Deployed automatically by GitHub Actions on every push to main.
# Manual deploy: docker stack deploy -c docker-compose.app.yml rastreamentowpp
#
# Required environment variables (set as Docker secrets or env in CI):
#   DB_PASSWORD   — PostgreSQL password
#   JWT_SECRET    — JWT signing key (min 32 chars)
#   FRONTEND_URL  — Your domain or http://IP (for CORS)
#
# Optional (can also be configured per-tenant via the UI):
#   META_ACCESS_TOKEN, META_PIXEL_ID, META_PAGE_ID, META_AD_ACCOUNT_ID

services:
  app:
    image: ghcr.io/${GITHUB_REPOSITORY:-deefy1v9/wpptracking}:latest
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=postgresql://rastreamento:${DB_PASSWORD}@db:5432/rastreamentowpp
      - JWT_SECRET=${JWT_SECRET}
      - FRONTEND_URL=${FRONTEND_URL:-http://103.199.184.64}
    networks:
      - traefik-public
      - internal
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        order: start-first          # Start new container before stopping old (zero downtime)
        failure_action: rollback
        delay: 10s
      rollback_config:
        parallelism: 0
        failure_action: continue
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
      labels:
        - traefik.enable=true
        # ── HTTP routing (IP-based, no domain) ──────────────────────────────
        - traefik.http.routers.rastreamentowpp.rule=PathPrefix(`/`)
        - traefik.http.routers.rastreamentowpp.entrypoints=web
        - traefik.http.services.rastreamentowpp.loadbalancer.server.port=3001
        # ── HTTPS routing (uncomment when you have a domain) ────────────────
        # - traefik.http.routers.rastreamentowpp-secure.rule=Host(`seu-dominio.com.br`)
        # - traefik.http.routers.rastreamentowpp-secure.entrypoints=websecure
        # - traefik.http.routers.rastreamentowpp-secure.tls.certresolver=letsencrypt
        # - traefik.http.services.rastreamentowpp-secure.loadbalancer.server.port=3001
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=rastreamento
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=rastreamentowpp
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - internal
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager   # Keep DB on manager node for data persistence
      restart_policy:
        condition: on-failure
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rastreamento -d rastreamentowpp"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  db-data:
    # Data persists across deploys — never removed unless explicitly deleted

networks:
  traefik-public:
    external: true
  internal:
    driver: overlay
    attachable: false   # DB not accessible from outside the stack

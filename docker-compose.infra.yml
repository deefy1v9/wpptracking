version: '3.9'

# ─── Infrastructure Stack (deploy once, rarely changes) ──────────────────────
# Deploy with: docker stack deploy -c docker-compose.infra.yml infra
#
# Provides:
#   - Traefik v3: Reverse proxy + automatic SSL via Let's Encrypt
#   - Portainer CE: Docker management UI

services:
  traefik:
    image: traefik:v3.6
    command:
      - --api.dashboard=true
      - --api.insecure=true                     # Dashboard on :8080 (no auth — protect with firewall)
      - --providers.swarm.endpoint=unix:///var/run/docker.sock
      - --providers.swarm.exposedbydefault=false
      - --providers.swarm.network=traefik-public
      - --entrypoints.web.address=:80
      # ── Uncomment below to enable HTTPS + Let's Encrypt ──────────────────
      # - --entrypoints.websecure.address=:443
      # - --entrypoints.web.http.redirections.entryPoint.to=websecure
      # - --entrypoints.web.http.redirections.entryPoint.scheme=https
      # - --certificatesresolvers.letsencrypt.acme.email=seu-email@dominio.com
      # - --certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json
      # - --certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web
    ports:
      - target: 80
        published: 80
        mode: host
      - target: 443
        published: 443
        mode: host
      - target: 8080
        published: 8080
        mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-letsencrypt:/letsencrypt
    networks:
      - traefik-public
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure

  portainer:
    image: portainer/portainer-ce:2.33
    ports:
      - target: 9000
        published: 9000
        mode: host
      - target: 9443
        published: 9443
        mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - portainer-data:/data
    networks:
      - traefik-public
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure

volumes:
  traefik-letsencrypt:
  portainer-data:

networks:
  traefik-public:
    external: true
